<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Day</title>

<link rel="stylesheet" href="style.css">
 <link rel="icon" type="image" sizes="200x180" href="/uploads/Dy! (1).png">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h1><strong style="color: rgb(242, 99, 43);">M</strong> <strong style="color: rgb(96, 106, 114);">Y</strong> <strong style="color: rgb(242, 99, 43);">D</strong> <strong style="color: rgb(96, 106, 114);">Y</strong></h1>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/loginfirst">Auteur</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <h1>Bienvenue sur <strong style="color: rgb(242, 99, 43);">M</strong> <strong style="color: rgb(96, 106, 114);">Y</strong> <strong style="color: rgb(242, 99, 43);">D</strong> <strong style="color: rgb(96, 106, 114);">Y</strong> !</h1>

  <div class="language-buttons">
    <button onclick="loadContent('ar')">العربية</button>
    <button onclick="loadContent('en')">English</button>
    <button onclick="loadContent('fr')">Français</button>
  </div>

  <div id="posts"></div>
</div>

<footer>
  © 2026 - <STrong>My Day</STrong> developpé par chiguer.M
</footer>
<script>
let currentLang = 'fr';

async function loadContent(lang) {
  currentLang = lang;

  const res = await fetch('/api/posts');
  const posts = await res.json();

  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach(post => {
    const div = document.createElement('div');
    div.classList.add('post');

   div.innerHTML = `
  <h2 class="${currentLang === 'ar' ? 'arabic' : ''}">
    ${post['title_' + currentLang]}
  </h2>
  <img src="${post.image}" alt="Image">
  <p class="${currentLang === 'ar' ? 'arabic' : ''}">
    ${post['text_' + currentLang]}
  </p>
`;

    container.appendChild(div);
  });
}

// Chargement initial
loadContent(currentLang);

/* ===============================
   AUTO REFRESH TOUTES LES 3 SECONDES
=================================*/
// Recharge quand on revient sur la page
window.addEventListener("focus", function() {
  loadContent(currentLang);
});

// Recharge si modification depuis auteur
window.addEventListener("storage", function(event) {
  if (event.key === "update") {
    loadContent(currentLang);
  }
});
</script>
</body>
</html>
